version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: weather_db

    restart: always

    environment:
      POSTGRES_DB: weather_dashboard
      POSTGRES_USER: weather_user
      POSTGRES_PASSWORD: weather_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: